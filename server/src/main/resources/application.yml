server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: msaas-server
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/msaas}
  data:
    mongodb:
      auto-index-creation: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:http://localhost:8081}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:replace-this-development-secret-with-at-least-32-bytes}
    ttl-minutes: ${JWT_TTL_MINUTES:1440}
  admin:
    bootstrap-email: ${ADMIN_BOOTSTRAP_EMAIL:admin@example.com}
