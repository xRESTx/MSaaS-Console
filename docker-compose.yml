services:
  mongo:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  server:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGODB_URI: mongodb://mongo:27017/msaas
      SPRING_MONGODB_URI: mongodb://mongo:27017/msaas
      JWT_SECRET: replace-this-development-secret-with-at-least-32-bytes
      APP_PUBLIC_BASE_URL: http://localhost:8081
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173
      ADMIN_BOOTSTRAP_EMAIL: admin@example.com
    ports:
      - "8081:8081"

  ui:
    build:
      context: ./ui
      args:
        VITE_API_BASE_URL: http://localhost:8081
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:4173"

volumes:
  mongo-data:
